openapi: 3.1.0
info:
  title: Nexora API
  version: 0.3.0
  description: 基于 OIDC Bearer token 与本地 PostgreSQL RBAC 的管理 API。
servers:
  - url: http://127.0.0.1:3000
paths:
  /health:
    get:
      operationId: getHealth
      summary: 检查 API 与 PostgreSQL 是否可用
      responses:
        "200":
          description: 服务可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /me:
    get:
      operationId: getCurrentUser
      summary: 校验本地账号并返回当前用户、角色与合并权限
      description: >-
        仅认证服务中存在身份还不代表可以登录本系统。identity_id 必须已经存在于
        account.users 且用户处于启用状态；接口不会为陌生身份自动创建本地用户。
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前授权快照
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AccountAccessForbidden"
  /users:
    get:
      operationId: listUsers
      summary: 分页列出用户
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 用户分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: provisionUser
      summary: 开通外部身份并建立初始用户角色关联
      description: >-
        管理员确认 OIDC 外部身份后创建本地用户，并在同一事务中建立 role_ids 指定的
        初始角色关联；role_ids 缺省时创建不带业务角色的用户。空集合只要求
        users:provision，非空集合还要求 users:roles.write。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionUserRequest"
      responses:
        "201":
          description: 用户已开通；Location 指向用户资源
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /users/{user_id}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      operationId: getUser
      summary: 返回用户授权详情
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 用户授权详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateUserStatus
      summary: 启用或停用用户
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatus"
      responses:
        "200":
          description: 更新后的用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /users/{user_id}/roles:
    parameters:
      - $ref: "#/components/parameters/UserId"
    put:
      operationId: replaceUserRoles
      summary: 原子替换用户角色
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceUserRoles"
      responses:
        "200":
          description: 更新后的用户授权详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /roles:
    get:
      operationId: listRoles
      summary: 列出角色及其权限
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 角色集合
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createRole
      summary: 创建自定义角色
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRole"
      responses:
        "201":
          description: 已创建角色；Location 指向角色资源
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /roles/{role_id}:
    parameters:
      - $ref: "#/components/parameters/RoleId"
    get:
      operationId: getRole
      summary: 返回角色及其权限
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 角色详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateRole
      summary: 修改自定义角色元数据
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRole"
      responses:
        "200":
          description: 更新后的角色
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      operationId: deleteRole
      summary: 删除未被引用的自定义角色
      security:
        - bearerAuth: []
      responses:
        "204":
          description: 角色已删除
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /roles/{role_id}/permissions:
    parameters:
      - $ref: "#/components/parameters/RoleId"
    put:
      operationId: replaceRolePermissions
      summary: 原子替换自定义角色权限
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceRolePermissions"
      responses:
        "200":
          description: 更新后的角色
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /permissions:
    get:
      operationId: listPermissions
      summary: 列出权限目录
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 权限集合
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Permission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Za-z0-9]{8}$"
        minLength: 8
        maxLength: 8
    RoleId:
      name: role_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  responses:
    Unauthorized:
      description: Bearer token 缺失、无效或已过期
      headers:
        WWW-Authenticate:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: 用户已停用或缺少权限
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    AccountAccessForbidden:
      description: 本地账号不存在（account_not_registered）或用户已停用（account_suspended）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: 资源冲突、操作会移除最后一个管理员，或试图修改内置超级管理员
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationFailed:
      description: 字段校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ServiceUnavailable:
      description: PostgreSQL 或身份提供方暂时不可用
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          const: ok
    UserStatus:
      type: string
      enum: [active, suspended]
    User:
      type: object
      required: [id, identity_id, display_name, status, is_super_admin, created_at, updated_at, last_login_at]
      properties:
        id:
          type: string
          pattern: "^[A-Za-z0-9]{8}$"
          minLength: 8
          maxLength: 8
        identity_id:
          type: string
          description: 认证授权服务中与用户对应的稳定唯一 ID
        email:
          type: [string, "null"]
          format: email
        display_name:
          type: string
        avatar_url:
          type: [string, "null"]
          format: uri
        status:
          $ref: "#/components/schemas/UserStatus"
        is_super_admin:
          type: boolean
          description: 是否为不挂载角色或权限、直接绕过权限校验的系统唯一超级管理员
        created_at:
          type: integer
          format: int64
          description: 用户创建时间的 Unix 秒时间戳
        updated_at:
          type: integer
          format: int64
          description: 用户资料最后更新时间的 Unix 秒时间戳
        last_login_at:
          type: integer
          format: int64
          description: 最近成功登录时间的 Unix 秒时间戳
    Permission:
      type: object
      required: [id, key, name]
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
        key:
          type: string
          pattern: "^[a-z][a-z0-9._-]+:[a-z][a-z0-9._-]+$"
        name:
          type: string
        description:
          type: [string, "null"]
    Role:
      type: object
      required: [id, key, name, is_system, permissions, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
        key:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]
        is_system:
          type: boolean
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        created_at:
          type: integer
          format: int64
          description: 角色创建时间的 Unix 秒时间戳
        updated_at:
          type: integer
          format: int64
          description: 角色最后更新时间的 Unix 秒时间戳
    AccessProfile:
      type: object
      required: [user, roles, permissions]
      properties:
        user:
          $ref: "#/components/schemas/User"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
        permissions:
          type: array
          items:
            type: string
    UserPage:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        page:
          type: object
          required: [number, size, total]
          properties:
            number:
              type: integer
            size:
              type: integer
            total:
              type: integer
    UpdateUserStatus:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/UserStatus"
    ProvisionUserRequest:
      type: object
      additionalProperties: false
      required: [identity_id, display_name]
      properties:
        identity_id:
          type: string
          minLength: 1
          maxLength: 255
          description: 当前部署绑定的 OIDC issuer 中稳定且唯一的 subject
        email:
          type: [string, "null"]
          format: email
        display_name:
          type: string
          minLength: 1
          maxLength: 200
        avatar_url:
          type: [string, "null"]
          format: uri
        role_ids:
          type: array
          default: []
          maxItems: 64
          uniqueItems: true
          description: 创建用户时原子建立的初始业务角色集合；缺省时使用空集合
          items:
            type: integer
            format: int64
            minimum: 1
    ReplaceUserRoles:
      type: object
      additionalProperties: false
      required: [role_ids]
      properties:
        role_ids:
          type: array
          maxItems: 64
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
    CreateRole:
      type: object
      additionalProperties: false
      required: [key, name]
      properties:
        key:
          type: string
          pattern: "^[a-z][a-z0-9._-]{1,63}$"
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: [string, "null"]
          maxLength: 1000
        permission_ids:
          type: array
          default: []
          maxItems: 256
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
    UpdateRole:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: [string, "null"]
          maxLength: 1000
    ReplaceRolePermissions:
      type: object
      additionalProperties: false
      required: [permission_ids]
      properties:
        permission_ids:
          type: array
          maxItems: 256
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
            request_id:
              type: string
