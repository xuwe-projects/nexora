name: Verify CLI installation

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Nexora CLI from the local checkout
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: cargo install --path crates/nexora --locked --force --no-default-features --features cli --bin nexora
      - name: Install Nexora CLI from the published GitHub tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: cargo install --git https://github.com/xuwe-projects/nexora --tag ${{ github.ref_name }} --locked --force --no-default-features --features cli --bin nexora
      - name: Verify the installed executable
        run: nexora --version
