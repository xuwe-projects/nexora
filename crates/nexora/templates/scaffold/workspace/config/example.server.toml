[server]
# HTTP 服务监听 IP。127.0.0.1 仅允许本机访问；容器或直接对外监听通常使用 0.0.0.0。
ip = "127.0.0.1"
# HTTP 服务监听端口；常规部署使用 1 到 65535，测试时可使用 0 让系统自动分配空闲端口。
port = 3000

[database]
# PostgreSQL 连接 URL；请替换用户名、密码、主机、端口和数据库名，生产环境建议改用环境变量注入。
url = "postgres://postgres:postgres@127.0.0.1:5432/nexora"
# 单个服务实例允许使用的最大数据库连接数；多实例部署时需同时考虑数据库总连接上限。
max_connections = 10

[setup]
# 仅用于未初始化系统进入 /setup 页面；初始化完成后该页面永久返回 404。
# 请替换为长随机值。生产环境建议删除本行并使用 SETUP__SECRET 从密钥系统注入。
secret = "replace-with-a-long-random-setup-secret"

[account.oidc]
# OIDC Provider 的 issuer URL，必须与其 discovery 文档中的 issuer 完全一致。
issuer_url = "https://identity.example.com"
# Account API 接受的 access token audience；填写 Provider 中代表该 API/资源服务的标识。
audience = "nexora-api"
# 创建用户所属的 ZITADEL Organization ID。
organization_id = "replace-with-zitadel-organization-id"
# ZITADEL Project ID，用于通过 ProjectService v2 创建和同步本系统角色；它不是 API Client ID。
project_id = "replace-with-zitadel-project-id"
# ZITADEL 服务账号 PAT，用于 UserService 与 ProjectService v2；不要提交真实令牌。
# 生产环境建议删除本行并使用 ACCOUNT__OIDC__PERSONAL_ACCESS_TOKEN 从密钥系统注入。
personal_access_token = "replace-with-zitadel-service-account-pat"
